      overflow: hidden;

        xaxis: "x",
        yaxis: "y",
      },
      {
        type: "bar",
        name: "Volume",
        x: data.dates,
        y: data.volumes,
        marker: {color: "rgba(79, 110, 149, 0.34)"},
        xaxis: "x",
        yaxis: "y2",
        hovertemplate: "%{x}<br>Volume: %{y:,}<extra></extra>",
      },
      {
        type: "scatter",
        mode: "lines",
        name: "10W MA",
        x: data.dates,
        y: data.ma10,
        line: {color: "#2f6fb2", width: 2},
        connectgaps: false,
        xaxis: "x",
        yaxis: "y",
      },
      {
        type: "scatter",
        mode: "lines",
        name: "26W MA",
        x: data.dates,
        y: data.ma26,
        line: {color: "#6f4aa8", width: 2},
        connectgaps: false,
        xaxis: "x",
        yaxis: "y",
      },
    ];
    const layout = {
      template: "plotly_white",
      hovermode: "x unified",
      margin: {t: 16, l: 56, r: 56, b: 40},

      xaxis: {rangeslider: {visible: false}, showgrid: true},

      yaxis2: {title: "Volume", domain: [0, 0.24], fixedrange: false, showgrid: false, anchor: "x"},

    Plotly.newPlot("chart", traces, layout, {responsive: true, displaylogo: false});
