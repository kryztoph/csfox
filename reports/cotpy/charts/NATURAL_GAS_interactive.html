    :root {

    * { box-sizing: border-box; }

      margin-bottom: 18px;

      margin-bottom: 8px;

    .brand-logo { width: 46px; height: auto; display: block; }
    .brand-text { font-size: 18px; font-weight: 750; }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 .ticker { font-size: 18px; color: var(--muted); font-weight: 600; margin-left: 8px; }

    .stats, .panel, .chart-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(82px, 1fr));
      overflow: hidden;
      margin-bottom: 16px;
    }
    .stats div {
      padding: 10px 12px;
      border-left: 1px solid #edf0f4;
    }
    .stats div:first-child { border-left: 0; }
    .stats span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stats strong {
      display: block;
      font-size: 15px;
      margin-top: 2px;
    }
    .chart-card { padding: 12px; overflow-x: auto; }
    #chart { width: 100%; min-width: 860px; height: 760px; }
    .panel { padding: 12px; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #edf0f4;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      font-size: 13px;
    }
    .num { text-align: right; }
    table a {
      color: #245fa8;
      text-decoration: none;
      font-weight: 650;
    }
    table a:hover { text-decoration: underline; }
    .report-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 760px) {
      header { display: block; }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      #chart { min-width: 0; height: 640px; }
    }
