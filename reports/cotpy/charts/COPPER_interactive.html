    }

      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stats strong {
      display: block;
      font-size: 15px;
      margin-top: 2px;
    }
    .chart-card { padding: 12px; overflow-x: auto; }
    #chart { width: 100%; min-width: 860px; height: 760px; }
    .panel { padding: 12px; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #edf0f4;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      font-size: 13px;
    }
    .num { text-align: right; }
    table a {
      color: #245fa8;
      text-decoration: none;
      font-weight: 650;
    }
    table a:hover { text-decoration: underline; }
    .report-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
