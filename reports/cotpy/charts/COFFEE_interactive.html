  <style>
    :root {
      color-scheme: light;

      --line: #d8dee7;
      --panel: #ffffff;
      --up: #1f8f5f;
      --down: #b94a48;
      --ma10: #2f6fb2;
      --ma26: #6f4aa8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }
    main {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 8px;
    }
    .brand-logo { width: 46px; height: auto; display: block; }
    .brand-text { font-size: 18px; font-weight: 750; }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 { margin: 0; font-size: 30px; }
    h1 .ticker { font-size: 18px; color: var(--muted); font-weight: 600; margin-left: 8px; }
    .meta { color: var(--muted); margin: 8px 0 0; font-size: 14px; }
    .stats, .panel, .chart-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(82px, 1fr));
      overflow: hidden;
      margin-bottom: 16px;
    }
    .stats div {
      padding: 10px 12px;
      border-left: 1px solid #edf0f4;
    }
    .stats div:first-child { border-left: 0; }
    .stats span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stats strong {
      display: block;
      font-size: 15px;
      margin-top: 2px;
    }
    .chart-card { padding: 12px; overflow-x: auto; }
    #chart { width: 100%; min-width: 860px; height: 760px; }
    .panel { padding: 12px; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #edf0f4;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      font-size: 13px;
    }
    .num { text-align: right; }
    table a {
      color: #245fa8;
      text-decoration: none;
      font-weight: 650;
    }
    table a:hover { text-decoration: underline; }
    .report-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 760px) {
      header { display: block; }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      #chart { min-width: 0; height: 640px; }
    }
    </style>
