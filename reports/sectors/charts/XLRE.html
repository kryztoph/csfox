<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XLRE Sector Chart</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --text: #17202a;
      --muted: #687485;
      --line: #d8dee7;
      --panel: #ffffff;
      --up: #1f8f5f;
      --down: #b94a48;
      --ma20: #2f6fb2;
      --ma50: #6f4aa8;
      --rs: #bf7b22;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }
    main {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 8px;
    }
    .brand-logo {
      width: 46px;
      height: auto;
      display: block;
    }
    .brand-text {
      font-size: 18px;
      font-weight: 750;
    }
    h1 {
      margin: 4px 0 4px;
      font-size: 28px;
      letter-spacing: 0;
    }
    p, a {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }
    a:hover { color: var(--text); }
    .chart, table, .stats {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .chart {
      padding: 12px;
      overflow-x: auto;
    }
    svg {
      display: block;
      width: 100%;
      min-width: 820px;
      height: auto;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(82px, 1fr));
      min-width: 520px;
      overflow: hidden;
    }
    .stats div {
      padding: 10px 12px;
      border-left: 1px solid #edf0f4;
    }
    .stats div:first-child { border-left: 0; }
    .stats span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stats strong {
      display: block;
      font-size: 15px;
      margin-top: 2px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #edf0f4;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      font-size: 13px;
    }
    .svg-bg { fill: #ffffff; }
    .panel {
      fill: #fbfcfd;
      stroke: #dce2ea;
    }
    .grid {
      stroke: #e9edf2;
      stroke-width: 1;
    }
    .wick.up, .candle.up { stroke: var(--up); fill: var(--up); }
    .wick.down, .candle.down { stroke: var(--down); fill: var(--down); }
    .wick { stroke-width: 1.5; }
    .volume.up { fill: rgba(31, 143, 95, 0.34); }
    .volume.down { fill: rgba(185, 74, 72, 0.34); }
    .ma20 {
      fill: none;
      stroke: var(--ma20);
      stroke-width: 2;
    }
    .ma50 {
      fill: none;
      stroke: var(--ma50);
      stroke-width: 2;
    }
    .volume-ma {
      fill: none;
      stroke: #45515f;
      stroke-width: 1.6;
    }
    .rs-line {
      fill: none;
      stroke: var(--rs);
      stroke-width: 2;
    }
    .trendline {
      fill: none;
      stroke: #111827;
      stroke-width: 1.7;
      stroke-dasharray: 7 5;
    }
    .rs-trend { stroke: #8c5a16; }
    .panel-title, .axis, .date, .legend {
      fill: #5f6b7a;
      font-size: 13px;
    }
    .panel-title { font-weight: 700; }
    .date.end { text-anchor: end; }
    .report-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 760px) {
      header { display: block; }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-width: 0;
        margin-top: 14px;
      }
    }
    </style>
</head>
